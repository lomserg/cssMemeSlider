<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <div class="slider">
      <input type="radio" name="slide" id="s1" checked />
      <input type="radio" name="slide" id="s2" />
      <input type="radio" name="slide" id="s3" />
      <input type="radio" name="slide" id="s4" />

      <div class="slides">
        <div class="track">
          <div class="slide">
            <img src="img/1.jpg" alt="" />
          </div>
          <div class="slide">
            <img src="img/2.jpg" alt="" />
          </div>
          <div class="slide">
            <img src="img/3.jpg" alt="" />
          </div>
          <div class="slide">
            <img src="img/4.jpg" alt="" />
          </div>
        </div>
      </div>

      <div class="bottom">
        <div class="captions">
          <div class="caption-track">
            <p>Первый мем</p>
            <p>Второй мем</p>
            <p>Третий мем</p>
            <p>Четвертый мем</p>
          </div>
        </div>

        <div class="controls">
          <label for="s1"><span></span></label>
          <label for="s2"><span></span></label>
          <label for="s3"><span></span></label>
          <label for="s4"><span></span></label>
        </div>
      </div>
    </div>
  </body>
</html>
