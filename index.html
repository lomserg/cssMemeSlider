<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="slider">
      <input type="radio" name="slide" id="s1" checked />
      <input type="radio" name="slide" id="s2" />
      <input type="radio" name="slide" id="s3" />
      <input type="radio" name="slide" id="s4" />

      <div class="slides">
        <div class="track">
          <div class="slide">
            <img src="img/1.png" alt="" />
          </div>
          <div class="slide">
            <img src="img/2.png" alt="" />
          </div>
          <div class="slide">
            <img src="img/3.png" alt="" />
          </div>
          <div class="slide">
            <img src="img/4.png" alt="" />
          </div>
        </div>
      </div>

      <div class="bottom">
        <div class="captions">
          <div class="caption-track">
            <p>
              Когда после десятого проекта понимаешь, что баги — это не проблема
              языка. Кроме некоторых случаев с JavaScript
            </p>
            <p>
              Когда мозг весь день молчал, а в 3 часа ночи решил: «Я знаю, где
              ошибка»
            </p>
            <p>Разница в профессиональном менталитете</p>
            <p>
              Разработчики часто забывают использовать JSON.parse после
              JSON.stringify
            </p>
          </div>
        </div>

        <div class="controls">
          <label for="s1"><span></span></label>
          <label for="s2"><span></span></label>
          <label for="s3"><span></span></label>
          <label for="s4"><span></span></label>
        </div>
      </div>
    </div>
  </body>
</html>
